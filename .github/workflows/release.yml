name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y
      - name: Build Windows executable
        shell: powershell
        run: |
          uv run --extra dev pyinstaller --noconfirm --clean --windowed --onefile --name ImageJakdu src/image_jakdu/__main__.py
          Copy-Item dist\ImageJakdu.exe dist\ImageJakdu-0.1.2-windows.exe
      - name: Build Windows installer
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile packaging\windows\vc_redist.x64.exe
          Push-Location packaging\windows
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" image-jakdu.nsi
          Pop-Location
      - uses: actions/upload-artifact@v4
        with:
          name: image-jakdu-windows
          path: |
            dist/ImageJakdu-0.1.2-windows.exe
            dist/ImageJakdu-0.1.2-windows-installer.exe
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/ImageJakdu-0.1.2-windows.exe
            dist/ImageJakdu-0.1.2-windows-installer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Build macOS app
        run: |
          uv run --extra dev pyinstaller --noconfirm --clean --windowed --name ImageJakdu src/image_jakdu/__main__.py
          ditto -c -k --sequesterRsrc --keepParent dist/ImageJakdu.app dist/ImageJakdu-0.1.2-macos-app.zip
          hdiutil create -volname ImageJakdu -srcfolder dist/ImageJakdu.app -ov -format UDZO dist/ImageJakdu-0.1.2-macos.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: image-jakdu-macos
          path: |
            dist/ImageJakdu-0.1.2-macos-app.zip
            dist/ImageJakdu-0.1.2-macos.dmg
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/ImageJakdu-0.1.2-macos-app.zip
            dist/ImageJakdu-0.1.2-macos.dmg
